<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - MediQueue</title>
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/Auth.css}" />
</head>
<body>

<div class="container login-container">
    <div class="curved-shape"></div>
    <div class="curved-shape2"></div>

    <div class="form-box">
        <h2>Đăng nhập</h2>
        <form th:action="@{/login}" method="post">
            <div class="input-box">
                <input type="text" name="tenDangNhap" th:value="${savedTenDangNhap}" required />
                <label>Tên đăng nhập hoặc Số điện thoại</label>
                <box-icon name="user" color="gray"></box-icon>
            </div>

            <div class="input-box">
                <input type="password" name="matKhau" id="password" required />
                <label>Mật khẩu</label>
                <box-icon id="togglePassword" name="lock-alt" color="gray" style="cursor:pointer"></box-icon>
            </div>

            <button class="btn" type="submit" style="margin-top: 25px;">Đăng nhập</button>

            <div class="regi-link">
                <p>Chưa có tài khoản? <a th:href="@{/register}">Đăng ký hồ sơ mới</a></p>
            </div> 
        </form>
    </div>

    <div class="info-content">
        <h2>WELCOME BACK!</h2>
        <p>Hệ thống Đặt lịch khám và Quản lý Bệnh viện MediQueue.</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<input type="hidden" id="globalSuccessMessage" th:value="${successMessage}" />
<input type="hidden" id="globalErrorMessage" th:value="${errorMessage}" />

<script th:src="@{/js/Error.js}"></script>

<script th:inline="javascript">
    // Script Tắt/Mở mắt xem mật khẩu
    const passwordInput = document.getElementById("password");
    const togglePassword = document.getElementById("togglePassword");
    togglePassword.addEventListener("click", () => {
        const type = passwordInput.type === "password" ? "text" : "password";
        passwordInput.type = type;
        togglePassword.setAttribute("name", type === "text" ? "lock-open-alt" : "lock-alt");
    });
</script>

</body>
</html>
