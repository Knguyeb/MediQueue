<!DOCTYPE html>
<html lang="vi"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{__${dynamicLayout}__}">
    <head>
        <title>Thêm Bác Sĩ mới</title>
        <link rel="stylesheet" th:href="@{/css/Create.css}" />
    </head>
    <body>

        <div layout:fragment="content">
            <div class="container-fluid fade-in-up py-5 px-4">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h4 class="text-subtitle">QUẢN LÝ BÁC SĨ</h4>
                        <h2 class="page-title">THÊM BÁC SĨ MỚI</h2>
                    </div>
                    <a class="btn btn-back-luxury" th:href="${bacSi.benhVien != null and bacSi.benhVien.maBenhVien != null ? '/bacsi/theobenhvien?maBenhVien=' + bacSi.benhVien.maBenhVien : '/bacsi/index'}">
                        <i class="bi bi-arrow-left me-2"></i> Quay lại
                    </a>
                </div>

                <div class="row">
                    <div class="col-lg-8 mx-auto">
                        <div class="glass-form-container">
                            <form th:action="@{/bacsi/create}" th:object="${bacSi}" method="post" id="createForm">
                                <h5 class="section-header"><i class="bi bi-person-vcard-fill me-2"></i>Thông tin Hồ sơ Bác sĩ</h5>

                                <div class="row g-4">
                                    
                                    <div class="col-md-6">
                                        <label class="form-label-luxury">Cơ sở trực thuộc <span class="text-danger">*</span></label>
                                        <div class="input-group luxury-input-group">
                                            <span class="input-group-text"><i class="bi bi-hospital"></i></span>
                                            
                                            <th:block th:if="${bacSi.benhVien != null and bacSi.benhVien.maBenhVien != null}">
                                                <input type="hidden" th:field="*{benhVien.maBenhVien}" />
                                                <select class="form-control" style="background-color: rgba(255, 255, 255, 0.05); color: #aaa; pointer-events: none;">
                                                    <option th:each="bv : ${danhSachBenhVien}"
                                                            th:value="${bv.maBenhVien}"
                                                            th:text="${bv.tenBenhVien}"
                                                            th:selected="${bv.maBenhVien == bacSi.benhVien.maBenhVien}">
                                                    </option>
                                                </select>
                                            </th:block>
                                            
                                            <th:block th:unless="${bacSi.benhVien != null and bacSi.benhVien.maBenhVien != null}">
                                                <select th:field="*{benhVien.maBenhVien}" class="form-control" style="background-color: rgba(0, 0, 0, 0.1); color: var(--white);" required>
                                                    <option value="" style="background-color: #222; color: #fff;">-- Chọn bệnh viện --</option>
                                                    <option th:each="bv : ${danhSachBenhVien}"
                                                            th:value="${bv.maBenhVien}"
                                                            th:text="${bv.tenBenhVien}"
                                                            style="background-color: #222; color: #fff;">
                                                    </option>
                                                </select>
                                            </th:block>
                                        </div>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label-luxury">Chuyên khoa <span class="text-danger">*</span></label>
                                        <div class="input-group luxury-input-group">
                                            <span class="input-group-text"><i class="bi bi-heart-pulse"></i></span>
                                            <select th:field="*{chuyenKhoa.maDanhMuc}" class="form-control" style="background-color: rgba(0, 0, 0, 0.1); color: var(--white);" required>
                                                <option value="" style="background-color: #222; color: #fff;">-- Chọn chuyên khoa --</option>
                                                <option th:each="ck : ${danhSachChuyenKhoa}"
                                                        th:value="${ck.maDanhMuc}"
                                                        th:text="${ck.tenDanhMuc}"
                                                        style="background-color: #222; color: #fff;">
                                                </option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label-luxury">Họ và Tên Bác sĩ <span class="text-danger">*</span></label>
                                        <div class="input-group luxury-input-group">
                                            <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                                            <input type="text" th:field="*{hoTen}" class="form-control" required placeholder="VD: Nguyễn Văn A" />
                                        </div>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label-luxury">Số điện thoại <span class="text-danger">*</span></label>
                                        <div class="input-group luxury-input-group">
                                            <span class="input-group-text"><i class="bi bi-telephone-fill"></i></span>
                                            <input type="text" th:field="*{soDienThoai}" class="form-control" required placeholder="09xxxx..." />
                                        </div>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label-luxury">Giới tính</label>
                                        <div class="input-group luxury-input-group">
                                            <span class="input-group-text"><i class="bi bi-gender-ambiguous"></i></span>
                                            <select th:field="*{gioiTinh}" class="form-control" style="background-color: rgba(0, 0, 0, 0.1); color: var(--white);">
                                                <option value="true" style="background-color: #222; color: #fff;">Nam</option>
                                                <option value="false" style="background-color: #222; color: #fff;">Nữ</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label-luxury">Địa chỉ Email (Dùng để đăng nhập) <span class="text-danger">*</span></label>
                                        <div class="input-group luxury-input-group">
                                            <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
                                            <input type="email" th:field="*{email}" class="form-control" required placeholder="bacsi@mediqueue.vn" />
                                        </div>
                                        <small class="text-muted fst-italic mt-2 d-block"><i class="bi bi-shield-lock me-1"></i>Hệ thống sẽ tự động tạo tài khoản đăng nhập khi Bác sĩ được thêm.</small>
                                    </div>

                                </div>

                                <div class="form-actions mt-5 pt-4 d-flex justify-content-end gap-3">
                                    <a class="btn btn-back-luxury" th:href="${bacSi.benhVien != null and bacSi.benhVien.maBenhVien != null ? '/bacsi/theobenhvien?maBenhVien=' + bacSi.benhVien.maBenhVien : '/bacsi/index'}">
                                        <i class="bi bi-arrow-left me-2"></i>Hủy bỏ
                                    </a>
                                    <button type="submit" class="btn btn-create-luxury">
                                        <i class="bi bi-plus-lg me-2"></i> Khởi tạo Bác sĩ
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <th:block layout:fragment="scripts">
            <input type="hidden" id="errorMessage" th:value="${errorMessage}" />
            
            <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
            <script th:src="@{/js/Error.js}"></script>
        </th:block>

    </body>
</html>
