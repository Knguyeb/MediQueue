<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
    <head>
        <title>Thêm Bệnh viện mới</title>
        <link rel="stylesheet" th:href="@{/css/Create.css}" />
    </head>
    <body>

        <div layout:fragment="content">
            <div class="container-fluid fade-in-up py-5 px-4">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h4 class="text-subtitle">QUẢN LÝ BỆNH VIỆN</h4>
                        <h2 class="page-title">THÊM BỆNH VIỆN MỚI</h2>
                    </div>
                    <a class="btn btn-back-luxury" th:href="@{/benhvien/index}">
                        <i class="bi bi-arrow-left me-2"></i> Quay lại
                    </a>
                </div>

                <div class="glass-form-container">
                    <form th:action="@{/benhvien/create}" th:object="${benhVien}" method="post" enctype="multipart/form-data" id="createForm">
                        <input type="file" name="HinhAnhFiles" id="fileInput" multiple accept="image/*" class="visually-hidden" onchange="handleFileSelect(event)">
                        <div class="row g-5">

                            <div class="col-lg-7">
                                <h5 class="section-header"><i class="bi bi-info-circle-fill me-2"></i>Thông tin chung & Liên hệ</h5>

                                <div class="row g-4">
                                    <div class="col-12">
                                        <label class="form-label-luxury">Tên bệnh viện <span class="text-danger">*</span></label>
                                        <div class="input-group luxury-input-group">
                                            <span class="input-group-text"><i class="bi bi-hospital"></i></span>
                                            <input type="text" name="TenBenhVien" class="form-control" required placeholder="VD: Bệnh viện Chợ Rẫy..." />
                                        </div>
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label-luxury">Địa chỉ chi tiết <span class="text-danger">*</span></label>
                                        <div class="input-group luxury-input-group">
                                            <span class="input-group-text"><i class="bi bi-geo-alt-fill"></i></span>
                                            <input type="text" name="DiaChi" class="form-control" required placeholder="Số nhà, đường, quận, thành phố..." />
                                        </div>
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label-luxury">Số điện thoại liên hệ <span class="text-danger">*</span></label>
                                        <div class="input-group luxury-input-group">
                                            <span class="input-group-text"><i class="bi bi-telephone-fill"></i></span>
                                            <input type="text" name="SoDienThoai" class="form-control" required placeholder="Nhập số điện thoại" />
                                        </div>
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label-luxury">Email liên hệ</label>
                                        <div class="input-group luxury-input-group">
                                            <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
                                            <input type="email" name="Email" class="form-control" placeholder="email@benhvien.com" />
                                        </div>
                                    </div>

                                    <div class="col-12">
                                        <h5 class="section-header mb-0"><i class="bi bi-compass-fill me-2"></i>Tọa độ Bản đồ</h5>
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label-luxury">Vĩ độ (Latitude)</label>
                                        <div class="input-group luxury-input-group">
                                            <span class="input-group-text"><i class="bi bi-geo"></i></span>
                                            <input type="number" step="any" name="ViDo" class="form-control" placeholder="VD: 10.7626" />
                                        </div>
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label-luxury">Kinh độ (Longitude)</label>
                                        <div class="input-group luxury-input-group">
                                            <span class="input-group-text"><i class="bi bi-pin-map-fill"></i></span>
                                            <input type="number" step="any" name="KinhDo" class="form-control" placeholder="VD: 106.6601" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-lg-5">
                                <h5 class="section-header"><i class="bi bi-images me-2"></i>Thư viện Hình ảnh</h5>
                                <div class="upload-zone-container mb-4">
                                    <input type="file" name="HinhAnhFiles" id="fileInput" multiple accept="image/*" class="visually-hidden" onchange="handleFileSelect(event)">
                                    <label for="fileInput" class="upload-label-luxury py-5 text-center">
                                        <i class="bi bi-cloud-arrow-up-fill upload-icon" style="font-size: 3.5rem;"></i>
                                        <span class="upload-text d-block mt-3 fs-5 fw-bold text-white">Bấm để tải ảnh bệnh viện</span>
                                        <span class="upload-hint small text-muted">(Hỗ trợ JPG, PNG)</span>
                                    </label>
                                </div>
                                <label class="form-label-luxury mb-2">Ảnh xem trước:</label>
                                <div id="imageThumbnailsContainer" class="thumbnail-container thin-scrollbar border border-secondary border-opacity-25 rounded p-3" style="min-height: 250px; overflow-y: auto; background: rgba(0,0,0,0.1);">
                                    <p id="noImageText" class="text-muted small fst-italic text-center w-100 mt-5 pt-3">
                                    </p>
                                </div>
                            </div>
                        </div>

                        <div class="form-actions mt-5 pt-4 d-flex justify-content-end gap-3">
                            <a class="btn btn-back-luxury" th:href="@{/benhvien/index}">
                                <i class="bi bi-arrow-left me-2"></i>Hủy bỏ
                            </a>
                            <button type="submit" class="btn btn-create-luxury">
                                <i class="bi bi-plus-lg me-2"></i> Khởi tạo Bệnh viện
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <th:block layout:fragment="scripts">
            <input type="hidden" id="errorMessage" th:value="${errorMessage}" />

            <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

            <script th:src="@{/js/Error.js}"></script>
            <script th:src="@{/js/UploadAnh.js}"></script> 
        </th:block>

    </body>
</html>
